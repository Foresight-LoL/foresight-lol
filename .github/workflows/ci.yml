name: CI

on:
  push:
    branches: [master, development]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check (byte-compile)
        run: python -m compileall -q utils scripts tests sample

      - name: Check imports resolve
        run: python scripts/check_imports.py

      - name: Run tests
        run: |
          set +e
          pytest -q
          code=$?
          if [ $code -eq 5 ]; then
            echo "No tests collected yet — skipping."
            exit 0
          fi
          exit $code
