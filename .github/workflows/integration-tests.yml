name: integration-tests
on:
  push:
    branches: [master, development]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: foresight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: .
      INTEGRATION_DATABASE_URL: postgresql://test:test@localhost:5432/foresight_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: check imports resolve
        run: python scripts/check_imports.py

      - name: load schema
        run: |
          # todo: change this when we move from neon db
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE ROLE neondb_owner;"
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/sql/schema.sql

      - name: run tests
        run: pytest
