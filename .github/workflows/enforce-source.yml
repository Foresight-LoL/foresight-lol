name: enforce-source-branch
on:
  pull_request:
    branches: [master]

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: only development may merge into master
        if: github.head_ref != 'development'
        run: |
          echo "PRs into master must come from development (got '${{ github.head_ref }}')."
          exit 1